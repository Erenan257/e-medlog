server {
    listen 80;
    server_name localhost;

    # 1. Entrega os ficheiros do seu site (React/Vite)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # A magia do React: se o utilizador atualizar a página em /dashboard, 
        # o Nginx não dá erro 404, ele devolve o index.html e o React resolve a rota.
        try_files $uri $uri/ /index.html;
    }

    # 2. O Reverse Proxy (Ponte para o Backend)
    # Sempre que o frontend pedir algo em /api, o Nginx manda para o container do Python
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}